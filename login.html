<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ATS Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body id="login-page">
    
    <!-- Background Animated Shapes -->
    <div class="bg-shapes">
        <div class="shape shape-1" style="left: -10%; top: -10%;"></div>
        <div class="shape shape-2" style="right: -5%; top: 30%;"></div>
        <div class="shape shape-3" style="left: 20%; bottom: -20%;"></div>
    </div>

    <!-- Login Container -->
    <div class="login-wrapper">
        <div class="login-card glass-panel tilt-card">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Access your <span class="gradient-text">Premium Account</span></p>
            </div>

            <div class="form-toggle">
                <span id="tab-login" class="active">Login</span>
                <span id="tab-register">Register</span>
            </div>
            
            <!-- Login Form -->
            <form id="login-form" class="form-container active">
                <div class="input-group">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" id="username" placeholder="Username" required autocomplete="off">
                    <div class="glow-border"></div>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Password" required>
                    <div class="glow-border"></div>
                </div>

                <div class="error-msg" id="login-error">
                    <i class="fa-solid fa-circle-exclamation"></i> Invalid credentials.
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-4">Login to Dashboard</button>
                
                <div class="form-footer mt-3" style="text-align: center;">
                    <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                </div>
                
                <div class="dev-note" style="margin-top: 15px;">
                    <p style="font-size: 0.8rem; color: #88a;">Create an account, or use default: <br><code>admin</code> / <code>admin123</code></p>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="form-container">
                <div class="input-group">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" id="reg-username" placeholder="Choose Username" required autocomplete="off">
                    <div class="glow-border"></div>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="reg-password" placeholder="Create Password" required>
                    <div class="glow-border"></div>
                </div>

                <div class="error-msg" id="reg-error">
                    <i class="fa-solid fa-circle-exclamation"></i> Username already exists!
                </div>
                
                <div class="success-msg" id="reg-success">
                    <i class="fa-solid fa-circle-check"></i> Account created! You can now login.
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-4">Create Account</button>
            </form>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
