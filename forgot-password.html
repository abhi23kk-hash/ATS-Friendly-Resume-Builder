<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | ATS Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="forgot-password.css">
</head>
<body id="forgot-password-page">
    
    <div class="stellar-bg">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="nebula nebula-1"></div>
        <div class="nebula nebula-2"></div>
    </div>

    <div class="reset-container">
        <div class="glass-card">
            <div class="card-glow"></div>
            
            <div class="logo-area">
                <i class="fa-solid fa-user-shield brand-icon"></i>
            </div>

            <div id="step-1" class="reset-step active">
                <div class="card-header">
                    <h1>Identity <span class="accent-text">Check</span></h1>
                    <p>Enter your username to begin recovery</p>
                </div>
                
                <form id="verify-form">
                    <div class="input-field">
                        <i class="fa-solid fa-at field-icon"></i>
                        <input type="text" id="verify-username" placeholder="Username" required autocomplete="off">
                        <span class="focus-bar"></span>
                    </div>
                    
                    <div class="error-box" id="verify-error">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <span id="verify-error-text">Identity not found in our system.</span>
                    </div>

                    <button type="submit" class="btn-stellar">
                        <span>Continue</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                    
                    <a href="login.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> Back to Login</a>
                </form>
            </div>

            <div id="step-2" class="reset-step">
                <div class="card-header">
                    <h1>Secure <span class="accent-text">Reset</span></h1>
                    <p>Initialize your new access credentials</p>
                </div>
                
                <form id="reset-form">
                    <input type="hidden" id="reset-userid">
                    
                    <div class="input-field">
                        <i class="fa-solid fa-key field-icon"></i>
                        <input type="password" id="new-password" placeholder="New Password" required minlength="6">
                        <span class="focus-bar"></span>
                    </div>

                    <div class="input-field">
                        <i class="fa-solid fa-circle-check field-icon"></i>
                        <input type="password" id="confirm-password" placeholder="Confirm Password" required minlength="6">
                        <span class="focus-bar"></span>
                    </div>
                    
                    <div class="error-box" id="reset-error">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <span id="reset-error-text">Passwords do not match!</span>
                    </div>

                    <div class="success-box" id="reset-success">
                        <i class="fa-solid fa-check-double"></i>
                        <span>Protocol Updated. Redirecting...</span>
                    </div>

                    <button type="submit" class="btn-stellar">
                        <span>Update Security</span>
                        <i class="fa-solid fa-shield-halved"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Inline logic for the unique template flow
        document.addEventListener('DOMContentLoaded', () => {
             const verifyForm = document.getElementById('verify-form');
             const resetForm = document.getElementById('reset-form');
             
             const step1 = document.getElementById('step-1');
             const step2 = document.getElementById('step-2');
             
             if (verifyForm) {
                 verifyForm.addEventListener('submit', async (e) => {
                     e.preventDefault();
                     const username = document.getElementById('verify-username').value;
                     const errorBox = document.getElementById('verify-error');
                     
                     try {
                         const res = await fetch('/api/auth/forgot-password', {
                             method: 'POST',
                             headers: { 'Content-Type': 'application/json' },
                             body: JSON.stringify({ username })
                         });
                         
                         const data = await res.json();
                         if (res.ok) {
                             document.getElementById('reset-userid').value = data.userId;
                             step1.classList.remove('active');
                             step2.classList.add('active');
                         } else {
                             errorBox.querySelector('span').textContent = data.error;
                             errorBox.classList.add('show');
                             setTimeout(() => errorBox.classList.remove('show'), 3000);
                         }
                     } catch (err) {
                         console.error(err);
                     }
                 });
             }
             
             if (resetForm) {
                 resetForm.addEventListener('submit', async (e) => {
                     e.preventDefault();
                     const userId = document.getElementById('reset-userid').value;
                     const newPassword = document.getElementById('new-password').value;
                     const confirmPassword = document.getElementById('confirm-password').value;
                     const errorBox = document.getElementById('reset-error');
                     const successBox = document.getElementById('reset-success');
                     
                     if (newPassword !== confirmPassword) {
                         errorBox.classList.add('show');
                         setTimeout(() => errorBox.classList.remove('show'), 3000);
                         return;
                     }
                     
                     try {
                         const res = await fetch('/api/auth/reset-password', {
                             method: 'POST',
                             headers: { 'Content-Type': 'application/json' },
                             body: JSON.stringify({ userId, newPassword })
                         });
                         
                         if (res.ok) {
                             successBox.classList.add('show');
                             setTimeout(() => window.location.href = 'login.html', 2000);
                         } else {
                             const data = await res.json();
                             errorBox.querySelector('span').textContent = data.error;
                             errorBox.classList.add('show');
                         }
                     } catch (err) {
                         console.error(err);
                     }
                 });
             }
        });
    </script>
</body>
</html>
